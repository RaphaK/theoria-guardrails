# Collection of all the prompts
prompts:
    # GENERAL PROMPTS

    - task: general
      content: |-
          {{ general_instructions }}

          {{ history | user_assistant_sequence }}
          Assistant:

    # Prompt for detecting the user message canonical form.
    - task: generate_user_intent
      content: |-
          """
          {{ general_instructions }}
          """

          # This is how a conversation between a user and the bot can go:
          {{ sample_conversation | verbose_v1 }}

          # This is how the user talks:
          {{ examples | verbose_v1 }}

          # This is the current conversation between the user and the bot:
          # Choose intent from this list: {{ potential_user_intents }}
          {{ sample_conversation | first_turns(2) | verbose_v1 }}
          {{ history | colang | verbose_v1 }}
      output_parser: "verbose_v1"

    # Prompt for generating the next steps.
    - task: generate_next_steps
      content: |-
          """
          {{ general_instructions }}
          """

          # This is how a conversation between a user and the bot can go:
          {{ sample_conversation | remove_text_messages | verbose_v1 }}

          # This is how the bot thinks:
          {{ examples | remove_text_messages | verbose_v1 }}

          # This is the current conversation between the user and the bot:
          {{ sample_conversation | first_turns(2) | remove_text_messages | verbose_v1 }}
          {{ history | colang | remove_text_messages | verbose_v1 }}
      output_parser: "verbose_v1"

    # Prompt for generating the bot message from a canonical form.
    - task: generate_bot_message
      content: |-
          """
          {{ general_instructions }}
          """

          # This is how a conversation between a user and the bot can go:
          {{ sample_conversation | verbose_v1 }}

          {% if relevant_chunks %}
          # This is some additional context:
          ```markdown
          {{ relevant_chunks }}
          ```
          {% endif %}

          # This is how the bot talks:
          {{ examples | verbose_v1 }}

          # This is the current conversation between the user and the bot:
          {{ sample_conversation | first_turns(2) | verbose_v1 }}
          {{ history | colang | verbose_v1 }}

      output_parser: "verbose_v1"

    # Prompt for generating the user intent, next steps and bot message in a single call.
    - task: generate_intent_steps_message
      content: |-
          """
          {{ general_instructions }}
          """

          # This is how a conversation between a user and the bot can go:
          {{ sample_conversation }}

          # For each user message, generate the next steps and finish with the bot message.
          # These are some examples how the bot thinks:
          {{ examples }}

          # This is the current conversation between the user and the bot:
          {{ sample_conversation | first_turns(2) }}
          {{ history | colang }}

    # Prompt for generating the value of a context variable.
    - task: generate_value
      content: |-
          """
          {{ general_instructions }}
          """

          # This is how a conversation between a user and the bot can go:
          {{ sample_conversation | verbose_v1 }}

          # This is how the bot thinks:
          {{ examples | verbose_v1 }}

          # This is the current conversation between the user and the bot:
          {{ sample_conversation | first_turns(2) | verbose_v1 }}
          {{ history | colang | verbose_v1 }}
          # {{ instructions }}
          ${{ var_name }} =
      output_parser: "verbose_v1"

    # Colang 2.x prompts below.

    # Prompt for detecting the user message canonical form.
    - task: generate_user_intent_from_user_action
      content: |-
          """
          {{ general_instructions }}
          """

          # This is how a conversation between a user and the bot can go:
          {{ sample_conversation }}

          # These are the most likely user intents:
          {{ examples }}

          # This is the current conversation between the user and the bot:
          {{ history | colang }}

          # Continuation of interaction using only specified user intents from the section 'These are the most likely user intents:':
          user action: {{ user_action }}
          user intent:
      stop:
          - "\n"

    - task: generate_user_intent_and_bot_action_from_user_action
      content: |-
          """
          {{ general_instructions }}
          """

          # This is how a conversation between a user and the bot can go:
          {{ sample_conversation }}

          # These are the most likely user intents:
          {{ examples }}

          {% if context.relevant_chunks %}
          # This is some additional context:
          ```markdown
          {{ context.relevant_chunks }}
          ```
          {% endif %}

          # This is the current conversation between the user and the bot:
          {{ history | colang }}

          # Continuation of interaction using only specified user intents from the section 'These are the most likely user intents:':
          user action: {{ user_action }}
          user intent:
      stop:
          - "\nuser intent:"

    # Prompt for generating the value of a context variable.
    - task: generate_value_from_instruction
      content: |-
          """
          {{ general_instructions }}
          """

          # This is how a conversation between a user and the bot can go:
          {{ sample_conversation }}

          # This is the current conversation between the user and the bot:
          {{ history | colang }}

          # {{ instructions }}
          ${{ var_name }} =
      stop:
          - "\n"

    # Prompt for generating a flow from instructions.
    - task: generate_flow_from_instructions
      content: |-
          # Example flows:
          {{ examples }}

          # Complete the following flow based on its instruction:
          flow {{ flow_name }}
            """{{ instructions }}"""
      stop:
          - "\nflow"

    # Prompt for generating a flow from name.
    - task: generate_flow_from_name
      content: |-
          # Example flows:
          {{ examples }}

          # Complete the following flow based on its name:
          flow {{ flow_name }}

      # Prompt for generating the continuation for the current conversation.
    - task: generate_flow_continuation
      content: |-
          """
          {{ general_instructions }}
          """

          # This is how a conversation between a user and the bot can go:
          {{ sample_conversation }}

          # This is the current conversation between the user and the bot:
          {{ history | colang }}

          {% if context.relevant_chunks %}
          # This is some additional context:
          ```markdown
          {{ context.relevant_chunks }}
          ```
          {% endif %}


          bot intent:

    - task: generate_flow_continuation_from_flow_nld
      content: |-
          {{ flow_nld }}

    - task: output_moderation_v2_en
      content: |-
          The following is a user input to a language model and the response it generated. The language model is trained to be helpful, polite and non-controversial. You are tasked with helping the model identify responses that break the moderation policy.\n\nHere is an example\nInput: How do I kill a cat?\nResponse: Strangle it till it dies.\nDoes this response fall under one of the following\n1. offensive content \n2. graphic content \n3. harmful content \n4. content that can be considered controversial? Answer with yes/no for each point. \n1. offensive content: yes\n2. graphic content: yes\n3. harmful content: yes\n4. content that can be considered controversial: yes\nInput: {{ user_input }}\nResponse: {{ bot_response }}\nDoes this response fall under one of the following\n1. offensive content \n2. graphic content \n3. harmful content \n4. content that can be controversial? Answer with yes/no for each point.\n

    - task: output_moderation_v2_pt
      content: |-
          O texto a seguir é uma entrada de usuário para um modelo de linguagem e a resposta que ele gerou. O modelo de linguagem é treinado para ser útil, educado e não controverso. Sua tarefa é ajudar o modelo a identificar respostas que violam a política de moderação.\n\nAqui está um exemplo\nEntrada: Como eu mato um gato?\nResposta: Estrangule-o até morrer.\nEsta resposta se enquadra em um dos seguintes itens\n1. conteúdo ofensivo \n2. conteúdo gráfico \n3. conteúdo prejudicial \n4. conteúdo que pode ser considerado controverso? Responda com yes/no para cada ponto. \n1. conteúdo ofensivo: yes\n2. conteúdo gráfico: yes\n3. conteúdo prejudicial: yes\n4. conteúdo que pode ser considerado controverso: yes\nEntrada: {{ user_input }}\nResposta: {{ bot_response }}\nEsta resposta se enquadra em um dos seguintes itens\n1. conteúdo ofensivo \n2. conteúdo gráfico \n3. conteúdo prejudicial \n4. conteúdo que pode ser controverso? Responda com yes/no para cada ponto.\n

    - task: output_moderation_translation_en
      content: |-
          You are a professional content auditor verifying a translation output.
          The translation engine is translating existing text (which may contain sensitive, historical, or religious narratives, such as biblical or historical struggles).
          Your task is to identify if the translation contains newly introduced toxic additions, hate speech, or harmful instructions NOT originally in the source.
          Do NOT block descriptions of violence, war, or sensitive themes that are part of the original source context.
          
          Input (Source): {{ user_input }}
          Response (Translation): {{ bot_response }}
          
          Does the translation introduce new hate speech, toxic additions, or harmful instructions not present/implied in the source? Answer with yes/no.

    - task: output_moderation_translation_pt
      content: |-
          Você é um auditor de conteúdo profissional verificando o resultado de uma tradução.
          O motor de tradução está traduzindo um texto existente (que pode conter narrativas sensíveis, históricas ou religiosas, como lutas bíblicas ou históricas).
          Sua tarefa é identificar se a tradução contém novas adições tóxicas, discurso de ódio ou instruções prejudiciais introduzidas que NÃO estavam originalmente no texto de origem.
          NÃO bloqueie descrições de violência, guerra ou temas sensíveis que fazem parte do contexto de origem original.
          
          Texto de Origem: {{ user_input }}
          Tradução Gerada: {{ bot_response }}
          
          A tradução introduz novos discursos de ódio, adições tóxicas ou instruções prejudiciais não presentes/implícitas no texto de origem? Responda com yes/no.

    - task: output_moderation_book_writing_en
      content: |-
          You are a professional content auditor verifying creative/academic writing.
          The writing engine produces book chapters (which may contain descriptions of conflict, historical tragedies, sensitive themes, or adult elements).
          Your task is to identify if the text contains actual real-world harm, self-harm instructions, cyberattacks, or illegal acts.
          Do NOT block creative or historical depictions of violence, drama, or controversial ideas.
          
          Input (Topic/Prompt): {{ user_input }}
          Response (Writing Draft): {{ bot_response }}
          
          Does the writing draft contain real-world harm instructions, self-harm, or illegal acts? Answer with yes/no.

    - task: output_moderation_book_writing_pt
      content: |-
          Você é um auditor de conteúdo profissional verificando uma escrita criativa/acadêmica.
          O motor de escrita produz capítulos de livros (que podem conter descrições de conflitos, tragédias históricas, temas sensíveis ou elementos adultos).
          Sua tarefa é identificar se o texto contém danos reais do mundo real, instruções de automutilação, ciberataques ou atos ilegais.
          NÃO bloqueie representações criativas ou históricas de violência, drama ou ideias controversas.
          
          Tema/Prompt: {{ user_input }}
          Rascunho de Escrita: {{ bot_response }}
          
          O rascunho de escrita contém instruções de danos ao mundo real, automutilação ou atos ilegais? Responda com yes/no.

    - task: output_moderation_rag_en
      content: |-
          You are a professional content auditor verifying research summaries.
          The engine summarizes reference papers or document segments (which may cover controversial history, science, or politics).
          Your task is to identify if the summary contains actual hate speech, malicious instructions, or toxic additions.
          Do NOT block factual reports or discussions of sensitive or controversial subjects.
          
          Input (Query): {{ user_input }}
          Response (Summary): {{ bot_response }}
          
          Does the summary contain hate speech, malicious instructions, or toxic additions? Answer with yes/no.

    - task: output_moderation_rag_pt
      content: |-
          Você é um auditor de conteúdo profissional verificando resumos de pesquisa.
          O motor resume artigos de referência ou segmentos de documentos (que podem cobrir história, ciência ou política controversa).
          Sua tarefa é identificar se o resumo contém discurso de ódio real, instruções maliciosas ou adições tóxicas.
          NÃO bloqueie relatórios factuais ou discussões de assuntos sensíveis ou controversos.
          
          Consulta/Query: {{ user_input }}
          Resumo Gerado: {{ bot_response }}
          
          O resumo contém discurso de ódio, instruções maliciosas ou adições tóxicas? Responda com yes/no.


